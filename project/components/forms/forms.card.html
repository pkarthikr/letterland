<!-- @dsCard group="Components" viewport="700x300" name="Forms" subtitle="Button, IconButton, Input, Select, Checkbox, Radio, Switch" -->
<!doctype html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; padding: 24px; background: var(--surface-page); font-family: var(--font-body); }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 28px 36px; align-items: start; }
  .row { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
  .stack { display: flex; flex-direction: column; gap: 12px; }
  .lbl { font-size: 11px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; color: var(--text-subtle); margin-bottom: 12px; }
  section { }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel">
const { Button, IconButton, Input, Select, Checkbox, Radio, Switch } = window.LetterLandDesignSystem_3d51bd;
const Ic = ({d}) => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"><path d={d}/></svg>;
const search = "M11 11m-7 0a7 7 0 1 0 14 0a7 7 0 1 0 -14 0 M21 21l-4.3-4.3";
const plus = "M12 5v14M5 12h14";

function Demo() {
  return (
    <div className="grid">
      <section>
        <div className="lbl">Buttons</div>
        <div className="stack">
          <div className="row">
            <Button>Primary</Button>
            <Button variant="secondary">Secondary</Button>
            <Button variant="soft">Soft</Button>
            <Button variant="ghost">Ghost</Button>
          </div>
          <div className="row">
            <Button size="sm">Small</Button>
            <Button size="lg">Large</Button>
            <Button disabled>Disabled</Button>
          </div>
          <div className="row">
            <IconButton label="Search" variant="soft"><Ic d={search}/></IconButton>
            <IconButton label="Add" variant="secondary"><Ic d={plus}/></IconButton>
            <IconButton label="Search" variant="ghost"><Ic d={search}/></IconButton>
          </div>
        </div>
      </section>
      <section>
        <div className="lbl">Fields</div>
        <div className="stack">
          <Input label="Parent email" placeholder="you@example.com" leadingIcon={<Ic d={search}/>} />
          <Select label="Child's age" placeholder="Select age" options={["3 years","4 years","5 years"]} />
        </div>
      </section>
      <section>
        <div className="lbl">Choice</div>
        <div className="stack">
          <Checkbox label="Email me weekly progress" defaultChecked />
          <Radio name="p" label="Monthly" defaultChecked />
          <Radio name="p" label="Yearly" description="Save 20%" />
        </div>
      </section>
      <section>
        <div className="lbl">Toggle</div>
        <div className="stack">
          <Switch label="Sound effects" defaultChecked />
          <Switch label="Reduce motion" />
        </div>
      </section>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
</script>
</body>
</html>
