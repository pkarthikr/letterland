<script type="text/babel">
const { Tabs, Accordion } = window.LetterLandDesignSystem_3d51bd;

function Demo() {
  return (
    <div className="cols">
      <div>
        <p className="lbl">Tabs · pill</p>
        <Tabs variant="pill" tabs={[
          { id:'a', label:'About', content:<p style={{margin:0,fontSize:14,color:'var(--text-muted)'}}>Hi, I'm an early-literacy educator.</p> },
          { id:'w', label:'Work', content:<p style={{margin:0,fontSize:14,color:'var(--text-muted)'}}>Curriculum design & workshops.</p> },
          { id:'c', label:'Contact', content:<p style={{margin:0,fontSize:14,color:'var(--text-muted)'}}>Let's talk.</p> },
        ]} />
        <div style={{height:20}}></div>
        <p className="lbl">Tabs · underline</p>
        <Tabs variant="underline" tabs={[
          { id:'1', label:'Phonics', content:null },
          { id:'2', label:'Sight words', content:null },
        ]} />
      </div>
      <div>
        <p className="lbl">Accordion</p>
        <Accordion defaultOpen={['q1']} items={[
          { id:'q1', title:'What ages is this for?', content:'Designed for ages 3–6, with paths for pre-readers and early readers.' },
          { id:'q2', title:'Do I need to print anything?', content:'No printing required — everything works on screen, with optional printables.' },
        ]} />

    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
