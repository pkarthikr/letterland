<!-- @dsCard group="Colors" viewport="700x160" name="Status colors" subtitle="Muted, harmonized: success, warning, danger, info." -->
<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;padding:18px;background:var(--surface-card);font-family:var(--font-body);color:var(--text-body)}
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.cell{border:1px solid var(--border-subtle);border-radius:var(--radius-md);overflow:hidden}
.bar{height:46px}.lab{display:flex;align-items:center;gap:8px;padding:8px 10px}
.chip{width:14px;height:14px;border-radius:50%}.lab b{font-size:12px}.lab small{font-size:10px;color:var(--text-subtle);margin-left:auto}</style></head><body>
<div class="grid">
<div class="cell"><div class="bar" style="background:var(--success-soft)"></div><div class="lab"><span class="chip" style="background:var(--success)"></span><b>Success</b><small>5B8C6E</small></div></div>
<div class="cell"><div class="bar" style="background:var(--warning-soft)"></div><div class="lab"><span class="chip" style="background:var(--warning)"></span><b>Warning</b><small>D99A4E</small></div></div>
<div class="cell"><div class="bar" style="background:var(--danger-soft)"></div><div class="lab"><span class="chip" style="background:var(--danger)"></span><b>Danger</b><small>C0573F</small></div></div>
<div class="cell"><div class="bar" style="background:var(--info-soft)"></div><div class="lab"><span class="chip" style="background:var(--info)"></span><b>Info</b><small>6E8CA8</small></div></div>
</div></body></html>
