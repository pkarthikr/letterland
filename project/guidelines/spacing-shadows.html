<!-- @dsCard group="Spacing" viewport="700x170" name="Elevation / shadows" subtitle="Warm-tinted, soft. xs → xl." -->
<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;padding:26px 22px;background:var(--surface-page);font-family:var(--font-body);display:flex;gap:26px;align-items:center}
.b{width:96px}.box{height:72px;background:var(--surface-card);border-radius:var(--radius-lg)}
.b span{display:block;font-size:11px;color:var(--text-muted);margin-top:12px;text-align:center}</style></head><body>
<div class="b"><div class="box" style="box-shadow:var(--shadow-xs)"></div><span>xs</span></div>
<div class="b"><div class="box" style="box-shadow:var(--shadow-sm)"></div><span>sm</span></div>
<div class="b"><div class="box" style="box-shadow:var(--shadow-md)"></div><span>md</span></div>
<div class="b"><div class="box" style="box-shadow:var(--shadow-lg)"></div><span>lg</span></div>
<div class="b"><div class="box" style="box-shadow:var(--shadow-xl)"></div><span>xl</span></div>
</body></html>
