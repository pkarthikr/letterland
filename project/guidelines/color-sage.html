<!-- @dsCard group="Colors" viewport="700x150" name="Sage — secondary" subtitle="Calm green-grey. Soft tints + accents." -->
<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;padding:18px;background:var(--surface-card);font-family:var(--font-body)}
.row{display:flex;gap:0;border-radius:var(--radius-md);overflow:hidden;box-shadow:var(--shadow-xs)}
.sw{flex:1;height:88px;display:flex;flex-direction:column;justify-content:flex-end;padding:8px;color:var(--ink-900)}
.sw span{font-size:11px;font-weight:700}.sw small{font-size:10px;opacity:.7;font-variant-numeric:tabular-nums}
.dk{color:var(--ink-50)}</style></head><body>
<div class="row">
<div class="sw" style="background:var(--sage-50)"><span>50</span><small>#F4F6F0</small></div>
<div class="sw" style="background:var(--sage-100)"><span>100</span><small>#E8ECE0</small></div>
<div class="sw" style="background:var(--sage-200)"><span>200</span><small>#D9DDCF</small></div>
<div class="sw" style="background:var(--sage-300)"><span>300</span><small>#C2C9B3</small></div>
<div class="sw" style="background:var(--sage-400)"><span>400</span><small>#A4AE90</small></div>
<div class="sw dk" style="background:var(--sage-500)"><span>500</span><small>#8B9A7D</small></div>
<div class="sw dk" style="background:var(--sage-600)"><span>600</span><small>#6F7D63</small></div>
<div class="sw dk" style="background:var(--sage-700)"><span>700</span><small>#58634F</small></div>
<div class="sw dk" style="background:var(--sage-800)"><span>800</span><small>#434C3C</small></div>
<div class="sw dk" style="background:var(--sage-900)"><span>900</span><small>#2F3529</small></div>
</div></body></html>
