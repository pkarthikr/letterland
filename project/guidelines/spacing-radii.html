<!-- @dsCard group="Spacing" viewport="700x160" name="Corner radii" subtitle="xs 4 → 2xl 40, pill, full." -->
<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;padding:22px;background:var(--surface-card);font-family:var(--font-body);display:flex;gap:18px;flex-wrap:wrap;align-items:flex-end}
.b{width:74px}.box{height:64px;background:var(--sage-200);border:1.5px solid var(--sage-400)}
.b span{display:block;font-size:11px;color:var(--text-muted);margin-top:7px;text-align:center}</style></head><body>
<div class="b"><div class="box" style="border-radius:var(--radius-xs)"></div><span>xs · 4</span></div>
<div class="b"><div class="box" style="border-radius:var(--radius-sm)"></div><span>sm · 8</span></div>
<div class="b"><div class="box" style="border-radius:var(--radius-md)"></div><span>md · 12</span></div>
<div class="b"><div class="box" style="border-radius:var(--radius-lg)"></div><span>lg · 18</span></div>
<div class="b"><div class="box" style="border-radius:var(--radius-xl)"></div><span>xl · 28</span></div>
<div class="b"><div class="box" style="border-radius:var(--radius-pill)"></div><span>pill</span></div>
<div class="b"><div class="box" style="width:64px;border-radius:var(--radius-full)"></div><span>full</span></div>
</body></html>
