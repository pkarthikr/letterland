<!-- @dsCard group="Brand" viewport="700x200" name="Voice in one line" subtitle="Warm to children, credible to parents." -->
<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;padding:26px;background:var(--surface-card);font-family:var(--font-body);color:var(--text-body)}
.do,.dont{display:flex;gap:10px;align-items:flex-start;margin-bottom:10px;font-size:14px;line-height:1.45;max-width:62ch}
.k{font-weight:800;font-family:var(--font-display);font-size:12px;padding:2px 9px;border-radius:var(--radius-pill);flex:none;margin-top:1px}
.do .k{background:var(--success-soft);color:var(--success-text)}
.dont .k{background:var(--danger-soft);color:var(--danger-text)}
b{color:var(--text-strong)}</style></head><body>
<div class="do"><span class="k">Say</span><span>“Let’s sound out the word together — you’ve got this.” <b>Warm, encouraging, plain.</b></span></div>
<div class="dont"><span class="k">Not</span><span>“Leverage our phonics framework to optimize literacy outcomes.” <b>Jargon, cold, salesy.</b></span></div>
</body></html>
