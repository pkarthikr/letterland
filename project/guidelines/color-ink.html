<!-- @dsCard group="Colors" viewport="700x150" name="Ink — warm neutrals" subtitle="Browns & creams. Text, borders, surfaces." -->
<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;padding:18px;background:var(--surface-card);font-family:var(--font-body)}
.row{display:flex;gap:0;border-radius:var(--radius-md);overflow:hidden;box-shadow:var(--shadow-xs)}
.sw{flex:1;height:88px;display:flex;flex-direction:column;justify-content:flex-end;padding:8px;color:var(--ink-900)}
.sw span{font-size:11px;font-weight:700}.sw small{font-size:10px;opacity:.7;font-variant-numeric:tabular-nums}
.dk{color:var(--ink-50)}.bd{box-shadow:inset 0 0 0 1px var(--border-subtle)}</style></head><body>
<div class="row">
<div class="sw bd" style="background:var(--white)"><span>white</span><small>#FFFFFF</small></div>
<div class="sw" style="background:var(--ink-50)"><span>50</span><small>#FAF6F1</small></div>
<div class="sw" style="background:var(--ink-100)"><span>100</span><small>#F0EAE2</small></div>
<div class="sw" style="background:var(--ink-200)"><span>200</span><small>#E3DCD3</small></div>
<div class="sw" style="background:var(--ink-300)"><span>300</span><small>#C8BFB5</small></div>
<div class="sw" style="background:var(--ink-400)"><span>400</span><small>#A89E94</small></div>
<div class="sw dk" style="background:var(--ink-500)"><span>500</span><small>#8A8077</small></div>
<div class="sw dk" style="background:var(--ink-600)"><span>600</span><small>#6B6258</small></div>
<div class="sw dk" style="background:var(--ink-700)"><span>700</span><small>#4A423B</small></div>
<div class="sw dk" style="background:var(--ink-900)"><span>900</span><small>#2E2924</small></div>
</div></body></html>
