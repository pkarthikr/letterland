<!-- @dsCard group="Colors" viewport="700x170" name="Semantic roles" subtitle="How tokens map to text, surface, border, accent." -->
<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;padding:18px;background:var(--surface-page);font-family:var(--font-body)}
.wrap{display:flex;gap:14px}
.card{flex:1;background:var(--surface-card);border:1px solid var(--border-subtle);border-radius:var(--radius-lg);padding:16px;box-shadow:var(--shadow-sm)}
.ey{font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--text-subtle);font-weight:700;margin-bottom:6px}
h4{font-family:var(--font-display);color:var(--text-strong);margin:0 0 4px;font-size:18px}
p{margin:0;color:var(--text-body);font-size:13px}
.btn{display:inline-block;margin-top:12px;background:var(--accent);color:var(--text-on-accent);padding:8px 16px;border-radius:var(--radius-pill);font-weight:700;font-size:13px}
.soft{background:var(--surface-sage-soft);border-color:transparent}
.tag{display:inline-block;background:var(--accent-soft);color:var(--accent-on-soft);font-size:11px;font-weight:700;padding:3px 10px;border-radius:var(--radius-pill)}</style></head><body>
<div class="wrap">
<div class="card"><div class="ey">surface-card</div><h4>Readable on cream</h4><p>Body text uses <b>text-body</b> on <b>surface-card</b>.</p><a class="btn">Primary action</a></div>
<div class="card soft"><span class="tag">accent-soft</span><h4 style="margin-top:10px">Soft sage panel</h4><p>Calm secondary surface for asides and highlights.</p></div>
</div></body></html>
