<!-- @dsCard group="Colors" viewport="700x150" name="Clay — primary" subtitle="Warm terracotta. Accent at 500/600." -->
<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;padding:18px;background:var(--surface-card);font-family:var(--font-body)}
.row{display:flex;gap:0;border-radius:var(--radius-md);overflow:hidden;box-shadow:var(--shadow-xs)}
.sw{flex:1;height:88px;display:flex;flex-direction:column;justify-content:flex-end;padding:8px;color:var(--ink-900)}
.sw span{font-size:11px;font-weight:700}.sw small{font-size:10px;opacity:.7;font-variant-numeric:tabular-nums}
.dk{color:var(--ink-50)}</style></head><body>
<div class="row">
<div class="sw" style="background:var(--clay-50)"><span>50</span><small>#FBF1EB</small></div>
<div class="sw" style="background:var(--clay-100)"><span>100</span><small>#F6E1D5</small></div>
<div class="sw" style="background:var(--clay-200)"><span>200</span><small>#EFCBB6</small></div>
<div class="sw" style="background:var(--clay-300)"><span>300</span><small>#E3B7A0</small></div>
<div class="sw" style="background:var(--clay-400)"><span>400</span><small>#D4946F</small></div>
<div class="sw dk" style="background:var(--clay-500)"><span>500</span><small>#C77F5E</small></div>
<div class="sw dk" style="background:var(--clay-600)"><span>600</span><small>#B26645</small></div>
<div class="sw dk" style="background:var(--clay-700)"><span>700</span><small>#8F4F36</small></div>
<div class="sw dk" style="background:var(--clay-800)"><span>800</span><small>#6E3D2B</small></div>
<div class="sw dk" style="background:var(--clay-900)"><span>900</span><small>#4F2C20</small></div>
</div></body></html>
