<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Letter Land &mdash; Phonics Program</title>
<meta name="description" content="A comprehensive 90-session phonics program for ages 4&ndash;6. Eight units from listening skills to fluent reading &mdash; joyful, structured, and effective.">
<link rel="icon" href="./project/assets/favicon.svg">
<link rel="stylesheet" href="./project/styles.css">
<style>
  html { scroll-behavior: smooth; }
  body { margin: 0; background: var(--surface-page); }

  .ll-container {
    max-width: var(--container-xl);
    margin: 0 auto;
    padding-left: var(--gutter);
    padding-right: var(--gutter);
    width: 100%;
    box-sizing: border-box;
  }

  .ll-desktop-nav { display: flex; }
  .ll-mobile-toggle { display: none !important; }

  .ll-hero-grid    { display: grid; grid-template-columns: 1.1fr 0.9fr; gap: 56px; align-items: center; }
  .ll-results-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 18px; }
  .ll-stats-grid   { display: flex; gap: 0; }

  .ll-nav-link:hover { color: var(--text-strong) !important; background: var(--surface-sunken); }

  .ll-stat-item {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 16px;
    border-right: 1px solid var(--border-subtle);
  }
  .ll-stat-item:last-child { border-right: none; }

  .ll-unit-header {
    display: flex;
    align-items: center;
    gap: 16px;
    width: 100%;
    padding: 20px 24px;
    border: none;
    background: none;
    cursor: pointer;
    text-align: left;
    transition: background var(--duration-fast) var(--ease-out);
  }
  .ll-unit-header:hover { background: var(--surface-sunken); }

  .ll-outcome-item {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 6px 0;
    font-size: 14px;
    line-height: 1.5;
  }

  @media (max-width: 860px) {
    .ll-desktop-nav   { display: none !important; }
    .ll-mobile-toggle { display: flex !important; }
    .ll-hero-grid     { grid-template-columns: 1fr !important; gap: 36px; }
    .ll-hero-img      { order: -1; }
    .ll-results-grid  { grid-template-columns: repeat(2, 1fr) !important; }
    .ll-stats-grid    { flex-wrap: wrap; }
    .ll-stat-item     { flex: 1 1 40%; border-right: none; border-bottom: 1px solid var(--border-subtle); }
  }
  @media (max-width: 540px) {
    .ll-results-grid { grid-template-columns: 1fr !important; }
    .ll-stat-item    { flex: 1 1 100%; }
  }
</style>
</head>
<body>
<div id="app"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>

  { icon: 'ear',            title: 'Strong phonological awareness', desc: 'Can hear and manipulate the sounds in spoken words — the bedrock of all literacy.' },
  { icon: 'type',           title: 'All 26 letter sounds',          desc: 'Names, forms, and produces every letter sound with confidence.' },

/* ------------------------------------------------------------------ */
/* Helpers                                                              */
/* ------------------------------------------------------------------ */

function goTo(id) {
  const el = document.getElementById(id);
  if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function icons() {
  if (window.lucide) window.lucide.createIcons();
}

/* ------------------------------------------------------------------ */
/* Nav                                                                  */
/* ------------------------------------------------------------------ */

function Nav() {
  const [open, setOpen] = React.useState(false);
  React.useEffect(icons);

  const links = [
    { label: 'The Program', id: 'course' },
    { label: 'Outcomes',    id: 'results' },
  ];

  const go = (id) => { setOpen(false); setTimeout(() => goTo(id), 10); };

  return (
    <header style={{
      position: 'sticky', top: 0, zIndex: 30,
      background: 'rgba(250,246,241,0.92)',
      backdropFilter: 'blur(14px)',
      WebkitBackdropFilter: 'blur(14px)',
      borderBottom: '1px solid var(--border-subtle)',
    }}>
      <div className="ll-container" style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', height: 72 }}>
        <button onClick={() => goTo('hero')} style={{ border: 'none', background: 'none', cursor: 'pointer', padding: 0, display: 'flex' }}>
          <img src="./project/assets/logo-full.svg" alt="Letter Land" style={{ height: 36 }} />
        </button>

        <nav className="ll-desktop-nav" style={{ alignItems: 'center', gap: 2 }}>
          {links.map(function(l) {
            return (
              <button key={l.id} onClick={() => go(l.id)} className="ll-nav-link" style={{
                fontFamily: 'var(--font-display)', fontWeight: 700, fontSize: 15,
                color: 'var(--text-body)', padding: '8px 16px', borderRadius: 'var(--radius-pill)',
                border: 'none', background: 'transparent', cursor: 'pointer',
                transition: 'color var(--duration-fast) var(--ease-out), background var(--duration-fast) var(--ease-out)',
              }}>{l.label}</button>
            );
          })}
          <div style={{ marginLeft: 8 }}>
            <Button size="sm" onClick={() => go('contact')}>Get in touch</Button>
          </div>
        </nav>

        <button className="ll-mobile-toggle" onClick={() => setOpen(!open)} aria-label="Menu" style={{
          border: 'none', background: 'transparent', cursor: 'pointer', color: 'var(--text-strong)', padding: 8,
        }}>
          <i data-lucide={open ? 'x' : 'menu'} style={{ width: 26, height: 26 }}></i>
        </button>
      </div>

      {open && (
        <div className="ll-container" style={{
          paddingTop: 12, paddingBottom: 20,
          borderTop: '1px solid var(--border-subtle)',
          display: 'flex', flexDirection: 'column', gap: 2,
        }}>
          {links.map(function(l) {
            return (
              <button key={l.id} onClick={() => go(l.id)} style={{
                fontFamily: 'var(--font-display)', fontWeight: 700, fontSize: 17,
                color: 'var(--text-body)', padding: '12px 8px',
                border: 'none', background: 'transparent', cursor: 'pointer', textAlign: 'left',
              }}>{l.label}</button>
            );
          })}
          <div style={{ marginTop: 12 }}>

          </div>
        </div>
      )}
    </header>
  );
}

/* ------------------------------------------------------------------ */
/* Hero                                                                 */
/* ------------------------------------------------------------------ */

function Hero() {

      <div className="ll-container">

          <div>
            <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap', marginBottom: 20 }}>
              <Badge tone="clay" variant="solid">8 Units &middot; 90 Sessions</Badge>

            </div>
            <h1 style={{ fontSize: 'clamp(2.2rem, 4.8vw, 3.6rem)', margin: '0 0 20px', lineHeight: 1.06, letterSpacing: '-0.02em' }}>
              Helping little ones{' '}
              <span style={{ color: 'var(--accent)' }}>fall in love</span>{' '}
              with letters.
            </h1>
            <p style={{ fontSize: 'var(--text-md)', color: 'var(--text-muted)', maxWidth: '46ch', margin: '0 0 28px', lineHeight: 1.65 }}>
              A comprehensive, structured phonics program &mdash; from listening for sounds all the way to reading Level 1 books independently. Joyful, research-backed, and designed for ages 4&ndash;6.
            </p>
            <div style={{ display: 'flex', gap: 12, flexWrap: 'wrap', alignItems: 'center' }}>
              <Button size="lg" onClick={() => goTo('course')}
                trailingIcon={<i data-lucide="arrow-right" style={{ width: 18, height: 18 }}></i>}>
                Explore the program
              </Button>
              <Button size="lg" variant="secondary" onClick={() => goTo('results')}>
                See outcomes
              </Button>
            </div>
          </div>
          <div className="ll-hero-img" style={{ display: 'flex', justifyContent: 'center' }}>
            <div style={{
              background: 'var(--clay-100)',
              borderRadius: 'var(--radius-2xl)',
              padding: '40px 32px',
              display: 'flex', alignItems: 'center', justifyContent: 'center',
              width: '100%', maxWidth: 440,
              boxShadow: 'var(--shadow-lg)',
            }}>
              <img src="./project/assets/illustration-tiles.svg" alt="Playful letter tiles" style={{ width: '100%', maxWidth: 320 }} />
            </div>
          </div>
        </div>
      </div>
    </section>
  );
}

/* ------------------------------------------------------------------ */
/* Stats strip                                                          */
/* ------------------------------------------------------------------ */

function StatStrip() {
  const stats = [
    { value: '90',     label: 'Sessions' },
    { value: '45 min', label: 'Per session' },
    { value: '8',      label: 'Units' },
    { value: '4–6', label: 'Age range' },
  ];
  return (
    <div style={{ borderTop: '1px solid var(--border-subtle)', borderBottom: '1px solid var(--border-subtle)', background: 'var(--surface-card)' }}>
      <div className="ll-container">
        <div className="ll-stats-grid">
          {stats.map(function(s) {
            return (
              <div key={s.label} className="ll-stat-item">
                <span style={{ fontFamily: 'var(--font-display)', fontWeight: 800, fontSize: 'clamp(1.5rem, 3vw, 2rem)', color: 'var(--text-strong)', lineHeight: 1.1 }}>{s.value}</span>
                <span style={{ fontSize: 13, color: 'var(--text-subtle)', marginTop: 4, fontWeight: 600, letterSpacing: '0.04em', textTransform: 'uppercase' }}>{s.label}</span>
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}

/* ------------------------------------------------------------------ */
/* Unit accordion card                                                  */
/* ------------------------------------------------------------------ */

function UnitCard({ unit, isOpen, onToggle }) {
  React.useEffect(icons);
  const clay = unit.tone === 'clay';
  const bg = clay ? 'var(--clay-100)' : 'var(--sage-100)';
  const fg = clay ? 'var(--clay-600)' : 'var(--sage-600)';
  const border = isOpen ? (clay ? 'var(--clay-300)' : 'var(--sage-300)') : 'var(--border-subtle)';

  return (
    <div style={{ border: '1.5px solid ' + border, borderRadius: 'var(--radius-lg)', overflow: 'hidden', background: 'var(--surface-card)', transition: 'border-color var(--duration-normal) var(--ease-out)' }}>
      <button className="ll-unit-header" onClick={onToggle} aria-expanded={isOpen}>
        <span style={{ flex: 'none', width: 44, height: 44, borderRadius: 'var(--radius-md)', background: bg, color: fg, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
          <i data-lucide={unit.icon} style={{ width: 20, height: 20 }}></i>
        </span>
        <div style={{ flex: 1, minWidth: 0 }}>
          <span style={{ fontSize: 11, fontWeight: 700, letterSpacing: '0.08em', textTransform: 'uppercase', color: 'var(--text-subtle)' }}>
            Unit {unit.num} &middot; {unit.sessionRange}
          </span>
          <h3 style={{ margin: '2px 0 0', fontSize: 'var(--text-md)', lineHeight: 1.3 }}>{unit.title}</h3>
        </div>
        <span style={{ flex: 'none', width: 32, height: 32, borderRadius: 'var(--radius-full)', background: isOpen ? bg : 'var(--surface-sunken)', color: isOpen ? fg : 'var(--text-subtle)', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
          <i data-lucide={isOpen ? 'chevron-up' : 'chevron-down'} style={{ width: 16, height: 16 }}></i>
        </span>
      </button>

      {isOpen && (
        <div style={{ padding: '0 24px 24px', borderTop: '1px solid var(--border-subtle)' }}>
          <div style={{ paddingTop: 18, marginBottom: 18 }}>
            <p style={{ margin: '0 0 10px', fontSize: 12, fontWeight: 700, letterSpacing: '0.07em', textTransform: 'uppercase', color: 'var(--text-subtle)' }}>Sessions</p>
            <div style={{ display: 'flex', flexDirection: 'column', gap: 6 }}>
              {unit.sessions.map(function(s) {
                return (
                  <div key={s.range} style={{ display: 'flex', gap: 12, alignItems: 'baseline', fontSize: 14 }}>
                    <span style={{ flex: 'none', fontFamily: 'var(--font-display)', fontWeight: 700, fontSize: 12.5, color: fg, minWidth: 110 }}>{s.range}</span>
                    <span style={{ color: 'var(--text-muted)' }}>{s.topic}</span>
                  </div>
                );
              })}
            </div>
          </div>
          <div style={{ background: 'var(--success-soft)', borderRadius: 'var(--radius-md)', padding: '14px 16px' }}>
            <p style={{ margin: '0 0 10px', fontSize: 12, fontWeight: 700, letterSpacing: '0.07em', textTransform: 'uppercase', color: 'var(--success-text)' }}>After this unit, your child can:</p>
            {unit.outcomes.map(function(o) {
              return (
                <div key={o} className="ll-outcome-item">
                  <i data-lucide="check" style={{ width: 15, height: 15, color: 'var(--success)', marginTop: 1, flex: 'none' }}></i>
                  <span style={{ color: 'var(--success-text)', fontWeight: 500 }}>{o}</span>
                </div>
              );
            })}
          </div>
        </div>
      )}
    </div>
  );
}

function Units() {
  const [openId, setOpenId] = React.useState('u1');
  const toggle = (id) => setOpenId(function(prev) { return prev === id ? null : id; });

  return (
    <section id="course" style={{ background: 'var(--surface-sunken)', paddingTop: 'var(--space-11)', paddingBottom: 'var(--space-11)' }}>
      <div className="ll-container">
        <div style={{ textAlign: 'center', marginBottom: 'var(--space-9)' }}>
          <Badge tone="sage">The program</Badge>
          <h2 style={{ marginTop: 14, marginBottom: 10, fontSize: 'clamp(1.75rem, 3.5vw, 2.25rem)' }}>
            Eight units. A complete foundation in reading.
          </h2>
          <p style={{ color: 'var(--text-muted)', fontSize: 'var(--text-md)', margin: '0 auto', maxWidth: '52ch', lineHeight: 1.65 }}>
            Each unit builds on the last &mdash; from hearing sounds to reading fluently, spelling confidently, and writing independently.
          </p>
        </div>
        <div style={{ display: 'flex', flexDirection: 'column', gap: 12, maxWidth: 780, margin: '0 auto' }}>
          {UNITS.map(function(unit) {
            return (
              <UnitCard
                key={unit.id}
                unit={unit}
                isOpen={openId === unit.id}
                onToggle={() => toggle(unit.id)}
              />
            );
          })}
        </div>
      </div>
    </section>
  );
}

/* ------------------------------------------------------------------ */
/* Outcomes                                                             */
/* ------------------------------------------------------------------ */

function Results() {
  React.useEffect(icons);
  return (
    <section id="results" style={{ paddingTop: 'var(--space-11)', paddingBottom: 'var(--space-11)' }}>
      <div className="ll-container">
        <div style={{ textAlign: 'center', marginBottom: 'var(--space-9)' }}>
          <Badge tone="clay">Program outcomes</Badge>
          <h2 style={{ marginTop: 14, marginBottom: 10, fontSize: 'clamp(1.75rem, 3.5vw, 2.25rem)' }}>
            What your child will be able to do.
          </h2>
          <p style={{ color: 'var(--text-muted)', fontSize: 'var(--text-md)', margin: '0 auto', maxWidth: '52ch', lineHeight: 1.65 }}>
            By the end of all 90 sessions, most children are reading Level 1 books &mdash; and asking for more.
          </p>
        </div>

        <div className="ll-results-grid">
          {OUTCOMES.map(function(o) {
            return (
              <div key={o.title} style={{ background: 'var(--surface-card)', border: '1.5px solid var(--border-subtle)', borderRadius: 'var(--radius-lg)', padding: '22px 20px', display: 'flex', flexDirection: 'column', gap: 10 }}>
                <span style={{ width: 42, height: 42, borderRadius: 'var(--radius-md)', background: 'var(--clay-100)', color: 'var(--clay-600)', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
                  <i data-lucide={o.icon} style={{ width: 20, height: 20 }}></i>
